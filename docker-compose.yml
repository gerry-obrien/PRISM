
# PRISM — Docker Compose

# orchestration of 3 differents images :
#   1. ml-pipeline  : generate the data + train the model
#   2. backend      : API FastAPI
#   3. frontend     : UI Streamlit

version: "3.9"

services:


  ml-pipeline:
    build:
      context: .
      dockerfile: ml/Dockerfile
    container_name: prism-ml-pipeline
    env_file:
      - .env
    volumes:

      - shared-data:/app/data
      - shared-artifacts:/app/ml/artifacts

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: prism-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:

      - OLLAMA_URL=http://host.docker.internal:11434/api/chat
    volumes:
      - shared-data:/app/data
      - shared-artifacts:/app/ml/artifacts
    depends_on:
      ml-pipeline:
        condition: service_completed_successfully
    restart: unless-stopped


  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: prism-frontend
    ports:
      - "8501:8501"
    environment:

      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  shared-data:
  shared-artifacts:
